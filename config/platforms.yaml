platforms:
  # ============================================
  # 开发者平台
  # ============================================
  - name: github
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}
    
  - name: gitlab
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}

  # ============================================
  # 游戏平台
  # ============================================
  - name: steam
    enabled: true
    username: ${BABY_NAME}_gaming
    email: ${PARENT_EMAIL}
    
  - name: epic_games
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}
    dob: ${BABY_DOB}
    additionalFields:
      firstName: Baby
      lastName: ${LAST_NAME}
    
  - name: battlenet
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}
    dob: ${BABY_DOB}
    additionalFields:
      firstName: Baby
      lastName: ${LAST_NAME}
    
  - name: nintendo
    enabled: false  # 需要邮箱验证
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}
    dob: ${BABY_DOB}

  # ============================================
  # 社区平台
  # ============================================
  - name: reddit
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}
    
  - name: medium
    enabled: true
    username: ${BABY_NAME}
    email: ${PARENT_EMAIL}

# ============================================
# 通知配置
# ============================================
notification:
  telegram:
    enabled: true
    botToken: ${TELEGRAM_BOT_TOKEN}
    chatId: ${TELEGRAM_CHAT_ID}

# ============================================
# Webhook 配置
# ============================================
webhook:
  enabled: false
  secret: ${WEBHOOK_SECRET}
  port: ${WEBHOOK_PORT:-3000}
